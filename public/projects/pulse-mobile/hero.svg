<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <rect width="1200" height="800" fill="#F7F5F0"/>
  <!-- Decorative background circular shapes -->
  <circle cx="900" cy="400" r="300" fill="#10B981" opacity="0.04" filter="blur(80px)"/>

  <!-- Phone Container Centered -->
  <g transform="translate(425, 60)">
    <!-- Outer Case -->
    <rect x="0" y="0" width="350" height="680" rx="40" fill="#0F0F0E" stroke="#D1C9BE" stroke-width="4" />
    <!-- Screen -->
    <rect x="12" y="12" width="326" height="656" rx="32" fill="#F7F5F0" />
    
    <!-- Camera Notch -->
    <rect x="110" y="20" width="130" height="25" rx="12" fill="#0F0F0E" />

    <!-- App Header -->
    <text x="35" y="90" font-family="system-ui, sans-serif" font-weight="900" font-size="20" fill="#0F0F0E">Pulse</text>
    <circle cx="295" cy="82" r="15" fill="#10B981" opacity="0.15"/>
    <circle cx="295" cy="82" r="6" fill="#10B981"/>

    <!-- Dynamic Metrics Progress Wheel -->
    <g transform="translate(175, 230)">
      <!-- Background circle track -->
      <circle cx="0" cy="0" r="75" fill="none" stroke="#EAE6DF" stroke-width="12" />
      <!-- Colored indicator track -->
      <path d="M 0,-75 A 75,75 0 1,1 -55,50" fill="none" stroke="#10B981" stroke-width="14" stroke-linecap="round" />
      
      <!-- Inner text -->
      <text x="0" y="-10" font-family="monospace" font-size="10" font-weight="bold" fill="#6B7280" text-anchor="middle" letter-spacing="1">TODAY</text>
      <text x="0" y="22" font-family="system-ui, sans-serif" font-weight="bold" font-size="32" fill="#0F0F0E" text-anchor="middle">8,420</text>
      <text x="0" y="42" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">steps</text>
    </g>

    <!-- Cardiac metrics panel -->
    <g transform="translate(30, 360)">
      <rect x="0" y="0" width="290" height="100" rx="16" fill="#FFFFFF" stroke="#D1C9BE" stroke-width="1.5" />
      <text x="20" y="32" font-family="system-ui, sans-serif" font-weight="bold" font-size="11" fill="#6B7280" letter-spacing="1">HEART RATE</text>
      <text x="20" y="72" font-family="monospace" font-size="28" font-weight="bold" fill="#0F0F0E">72 bpm</text>
      
      <!-- Haptic Wave SVG -->
      <path d="M 180,65 L 200,65 L 210,35 L 220,95 L 230,50 L 240,65 L 270,65" fill="none" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Large Accessible Buttons (WCAG targets) -->
    <g transform="translate(30, 485)">
      <rect x="0" y="0" width="290" height="55" rx="27.5" fill="#0F0F0E" />
      <text x="145" y="32" font-family="system-ui, sans-serif" font-weight="bold" font-size="13" fill="#F7F5F0" text-anchor="middle" letter-spacing="0.5">LOG METRIC</text>
    </g>

    <g transform="translate(30, 555)">
      <rect x="0" y="0" width="290" height="55" rx="27.5" fill="transparent" stroke="#0F0F0E" stroke-width="1.5" />
      <text x="145" y="32" font-family="system-ui, sans-serif" font-weight="bold" font-size="13" fill="#0F0F0E" text-anchor="middle" letter-spacing="0.5">EMERGENCY ASSIST</text>
    </g>
  </g>
</svg>
