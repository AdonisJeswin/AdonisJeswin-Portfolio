<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <rect width="800" height="600" fill="#FFFFFF"/>
  <rect x="20" y="20" width="760" height="560" rx="12" fill="none" stroke="#D1C9BE" stroke-width="1.5"/>
  <text x="50" y="70" font-family="system-ui, sans-serif" font-weight="bold" font-size="16" fill="#0F0F0E">WEEKLY WELLNESS STATISTICS</text>
  <!-- Bar chart representation -->
  <g transform="translate(100, 150)">
    <!-- Y axis -->
    <line x1="0" y1="0" x2="0" y2="350" stroke="#0F0F0E" stroke-width="2"/>
    <!-- X axis -->
    <line x1="0" y1="350" x2="600" y2="350" stroke="#0F0F0E" stroke-width="2"/>
    
    <!-- Weekday bars -->
    <!-- Mon -->
    <rect x="40" y="100" width="40" height="250" rx="6" fill="#10B981" opacity="0.8"/>
    <text x="60" y="375" font-family="monospace" font-size="12" fill="#6B7280" text-anchor="middle">M</text>
    <!-- Tue -->
    <rect x="120" y="150" width="40" height="200" rx="6" fill="#10B981" opacity="0.8"/>
    <text x="140" y="375" font-family="monospace" font-size="12" fill="#6B7280" text-anchor="middle">T</text>
    <!-- Wed -->
    <rect x="200" y="50" width="40" height="300" rx="6" fill="#10B981"/>
    <text x="220" y="375" font-family="monospace" font-size="12" fill="#6B7280" text-anchor="middle">W</text>
    <!-- Thu -->
    <rect x="280" y="80" width="40" height="270" rx="6" fill="#10B981" opacity="0.8"/>
    <text x="300" y="375" font-family="monospace" font-size="12" fill="#6B7280" text-anchor="middle">T</text>
  </g>
</svg>
