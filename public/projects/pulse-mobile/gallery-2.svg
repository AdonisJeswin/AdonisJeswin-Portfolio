<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <rect width="800" height="600" fill="#FFFFFF"/>
  <rect x="20" y="20" width="760" height="560" rx="12" fill="none" stroke="#D1C9BE" stroke-width="1.5"/>
  <text x="50" y="70" font-family="system-ui, sans-serif" font-weight="bold" font-size="16" fill="#0F0F0E">ACCESSIBLE TYPOGRAPHY ADAPTATION</text>
  
  <!-- Font scale selectors -->
  <g transform="translate(80, 150)">
    <text x="0" y="20" font-family="system-ui, sans-serif" font-weight="bold" font-size="13" fill="#0F0F0E">TYPOGRAPHY SCALING PRESET</text>
    
    <rect x="0" y="45" width="140" height="50" rx="25" fill="#EAE6DF" stroke="#D1C9BE" stroke-width="1.5"/>
    <text x="70" y="75" font-family="system-ui, sans-serif" font-weight="bold" font-size="14" fill="#0c0c0c" text-anchor="middle">Standard (1x)</text>

    <rect x="160" y="45" width="140" height="50" rx="25" fill="#10B981" opacity="0.15" stroke="#10B981" stroke-width="2"/>
    <text x="230" y="75" font-family="system-ui, sans-serif" font-weight="bold" font-size="14" fill="#10B981" text-anchor="middle">Large (1.5x)</text>

    <rect x="320" y="45" width="140" height="50" rx="25" fill="#EAE6DF" stroke="#D1C9BE" stroke-width="1.5"/>
    <text x="390" y="75" font-family="system-ui, sans-serif" font-weight="bold" font-size="14" fill="#0c0c0c" text-anchor="middle">X-Large (2x)</text>

    <!-- Visual contrast tests -->
    <text x="0" y="160" font-family="system-ui, sans-serif" font-weight="bold" font-size="13" fill="#0F0F0E">HIGH CONTRAST THEME METRIC</text>
    <rect x="0" y="185" width="640" height="150" rx="8" fill="#0F0F0E"/>
    <text x="40" y="240" font-family="system-ui, sans-serif" font-weight="black" font-size="28" fill="#F7F5F0">Contrast Level: 14.2:1</text>
    <text x="40" y="280" font-family="monospace" font-size="14" fill="#10B981">✓ PASSES WCAG AAA COMPLIANCE RULES</text>
  </g>
</svg>
