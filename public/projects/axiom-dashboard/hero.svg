<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <rect width="1200" height="800" fill="#F7F5F0"/>
  <!-- Sub-surface grid lines -->
  <g stroke="#0F0F0E" stroke-width="0.5" opacity="0.06">
    <path d="M 0,100 L 1200,100 M 0,200 L 1200,200 M 0,300 L 1200,300 M 0,400 L 1200,400 M 0,500 L 1200,500 M 0,600 L 1200,600 M 0,700 L 1200,700"/>
    <path d="M 150,0 L 150,800 M 300,0 L 300,800 M 450,0 L 450,800 M 600,0 L 600,800 M 750,0 L 750,800 M 900,0 L 900,800 M 1050,0 L 1050,800"/>
  </g>

  <!-- Sidebar -->
  <rect x="0" y="0" width="240" height="800" fill="#0F0F0E"/>
  <circle cx="50" cy="50" r="16" fill="#4F46E5"/>
  <text x="80" y="55" font-family="system-ui, sans-serif" font-weight="800" font-size="16" fill="#F7F5F0" letter-spacing="1">AXIOM</text>
  <rect x="25" y="120" width="190" height="35" rx="8" fill="#4F46E5"/>
  <text x="45" y="142" font-family="system-ui, sans-serif" font-weight="600" font-size="12" fill="#F7F5F0">Server Analytics</text>
  
  <rect x="25" y="170" width="190" height="35" rx="8" fill="transparent" stroke="#F7F5F0" stroke-width="1" opacity="0.2"/>
  <text x="45" y="192" font-family="system-ui, sans-serif" font-weight="600" font-size="12" fill="#F7F5F0" opacity="0.5">Database Clusters</text>

  <!-- Main Content Dashboard -->
  <rect x="280" y="40" width="880" height="80" rx="12" fill="#FFFFFF" stroke="#D1C9BE" stroke-width="1.5"/>
  <text x="310" y="88" font-family="Georgia, serif" font-weight="bold" font-size="28" fill="#0F0F0E">Cluster Telemetry Dashboard</text>
  <rect x="1050" y="60" width="80" height="40" rx="20" fill="#4F46E5"/>
  <text x="1072" y="84" font-family="system-ui, sans-serif" font-weight="bold" font-size="11" fill="#F7F5F0">LIVE</text>

  <!-- Metric Cards -->
  <g transform="translate(280, 150)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="270" height="120" rx="12" fill="#FFFFFF" stroke="#D1C9BE" stroke-width="1.5"/>
    <text x="20" y="30" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#6B7280" letter-spacing="1">CPU UTILIZATION</text>
    <text x="20" y="75" font-family="monospace" font-size="36" font-weight="bold" fill="#0F0F0E">34.82%</text>
    <path d="M 180,85 Q 200,50 220,70 T 250,55" fill="none" stroke="#4F46E5" stroke-width="2.5"/>

    <!-- Card 2 -->
    <rect x="300" y="0" width="270" height="120" rx="12" fill="#FFFFFF" stroke="#D1C9BE" stroke-width="1.5"/>
    <text x="320" y="30" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#6B7280" letter-spacing="1">MEMORY BUFFER</text>
    <text x="320" y="75" font-family="monospace" font-size="36" font-weight="bold" fill="#0F0F0E">8.12 GB</text>
    <path d="M 480,75 Q 500,85 520,50 T 550,60" fill="none" stroke="#10B981" stroke-width="2.5"/>

    <!-- Card 3 -->
    <rect x="600" y="0" width="280" height="120" rx="12" fill="#FFFFFF" stroke="#D1C9BE" stroke-width="1.5"/>
    <text x="620" y="30" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#6B7280" letter-spacing="1">INGEST CAPACITY</text>
    <text x="620" y="75" font-family="monospace" font-size="36" font-weight="bold" fill="#0F0F0E">182k/s</text>
  </g>

  <!-- Large Graph Panel -->
  <rect x="280" y="300" width="880" height="460" rx="16" fill="#FFFFFF" stroke="#D1C9BE" stroke-width="1.5"/>
  <text x="310" y="340" font-family="system-ui, sans-serif" font-weight="bold" font-size="14" fill="#0F0F0E">REAL-TIME TELEMETRY GRAPH</text>

  <!-- Graph Grid -->
  <g stroke="#EAE6DF" stroke-width="1">
    <line x1="320" y1="400" x2="1120" y2="400" />
    <line x1="320" y1="480" x2="1120" y2="480" />
    <line x1="320" y1="560" x2="1120" y2="560" />
    <line x1="320" y1="640" x2="1120" y2="640" />
    <line x1="320" y1="720" x2="1120" y2="720" />
  </g>
  
  <!-- Graph Plot line 1 (Electric Indigo) -->
  <path d="M 320,680 L 400,640 L 480,670 L 560,530 L 640,580 L 720,440 L 800,490 L 880,380 L 960,420 L 1040,350 L 1120,390" fill="none" stroke="#4F46E5" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Graph Plot line 2 (Emerald) -->
  <path d="M 320,590 L 400,600 L 480,510 L 560,570 L 640,430 L 720,480 L 800,410 L 880,430 L 960,370 L 1040,390 L 1120,330" fill="none" stroke="#10B981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
</svg>
