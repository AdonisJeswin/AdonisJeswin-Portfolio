<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <rect width="1200" height="800" fill="#F7F5F0"/>
  <!-- Sub-surface grid lines -->
  <g stroke="#0F0F0E" stroke-width="0.5" opacity="0.05">
    <path d="M 0,100 L 1200,100 M 0,200 L 1200,200 M 0,300 L 1200,300 M 0,400 L 1200,400 M 0,500 L 1200,500 M 0,600 L 1200,600 M 0,700 L 1200,700"/>
    <path d="M 150,0 L 150,800 M 300,0 L 300,800 M 450,0 L 450,800 M 600,0 L 600,800 M 750,0 L 750,800 M 900,0 L 900,800 M 1050,0 L 1050,800"/>
  </g>

  <!-- Document Area -->
  <g transform="translate(100, 80)">
    <rect x="0" y="0" width="600" height="640" rx="16" fill="#FFFFFF" stroke="#D1C9BE" stroke-width="1.5" />
    <text x="50" y="60" font-family="Georgia, serif" font-weight="bold" font-size="24" fill="#0F0F0E">Privacy Policy &amp; Terms of Service</text>
    <text x="50" y="90" font-family="monospace" font-size="10" fill="#6B7280">Last Updated: June 2026</text>
    
    <!-- Paragraph Lines -->
    <rect x="50" y="130" width="500" height="8" rx="4" fill="#EAE6DF"/>
    <rect x="50" y="150" width="500" height="8" rx="4" fill="#EAE6DF"/>
    <!-- Highlighted Clause (Data Sharing) -->
    <rect x="50" y="170" width="500" height="30" rx="4" fill="#4F46E5" opacity="0.1"/>
    <rect x="55" y="176" width="490" height="8" rx="4" fill="#4F46E5"/>
    <rect x="55" y="188" width="340" height="8" rx="4" fill="#4F46E5"/>
    
    <rect x="50" y="215" width="500" height="8" rx="4" fill="#EAE6DF"/>
    <rect x="50" y="235" width="420" height="8" rx="4" fill="#EAE6DF"/>
    
    <!-- Highlighted Clause 2 (Consent) -->
    <rect x="50" y="260" width="500" height="30" rx="4" fill="#EF4444" opacity="0.1"/>
    <rect x="55" y="266" width="490" height="8" rx="4" fill="#EF4444"/>
    <rect x="55" y="278" width="410" height="8" rx="4" fill="#EF4444"/>
    
    <rect x="50" y="305" width="500" height="8" rx="4" fill="#EAE6DF"/>
    <rect x="50" y="325" width="500" height="8" rx="4" fill="#EAE6DF"/>
  </g>

  <!-- Chrome Extension Overlay (Floating Panel) -->
  <g transform="translate(750, 120)">
    <rect x="0" y="0" width="350" height="560" rx="20" fill="#0F0F0E" stroke="#4F46E5" stroke-width="2.5" />
    
    <!-- Header -->
    <text x="30" y="50" font-family="system-ui, sans-serif" font-weight="900" font-size="16" fill="#F7F5F0" letter-spacing="1">T&amp;C GUARD AI</text>
    <rect x="250" y="32" width="70" height="24" rx="12" fill="#4F46E5"/>
    <text x="267" y="48" font-family="system-ui, sans-serif" font-weight="bold" font-size="10" fill="#F7F5F0">ACTIVE</text>
    
    <!-- Risk Meter Gauge -->
    <circle cx="175" cy="160" r="60" fill="none" stroke="#EAE6DF" stroke-width="8" opacity="0.1"/>
    <path d="M 120,185 A 60,60 0 1,1 230,185" fill="none" stroke="#EF4444" stroke-width="10" stroke-linecap="round"/>
    <text x="175" y="155" font-family="system-ui, sans-serif" font-weight="bold" font-size="32" fill="#F7F5F0" text-anchor="middle">HIGH</text>
    <text x="175" y="175" font-family="monospace" font-size="10" fill="#6B7280" text-anchor="middle">RISK SCORE: 78%</text>

    <!-- Findings Summary list -->
    <g transform="translate(30, 260)">
      <text x="0" y="0" font-family="system-ui, sans-serif" font-weight="bold" font-size="12" fill="#4F46E5" letter-spacing="0.5">COMPLIANCE FINDINGS</text>
      
      <!-- Bullet 1 -->
      <circle cx="5" cy="25" r="4" fill="#EF4444"/>
      <text x="20" y="28" font-family="system-ui, sans-serif" font-size="11" fill="#F7F5F0" font-weight="semibold">Third-Party Data Selling</text>
      <text x="20" y="42" font-family="monospace" font-size="9" fill="#6B7280">Clause found on line 174</text>
      
      <!-- Bullet 2 -->
      <circle cx="5" cy="70" r="4" fill="#FBBF24"/>
      <text x="20" y="73" font-family="system-ui, sans-serif" font-size="11" fill="#F7F5F0" font-weight="semibold">Automatic Consent Renewal</text>
      <text x="20" y="87" font-family="monospace" font-size="9" fill="#6B7280">Clause found on line 263</text>
    </g>

    <!-- Actions -->
    <g transform="translate(30, 480)">
      <rect x="0" y="0" width="290" height="45" rx="10" fill="#4F46E5" />
      <text x="145" y="26" font-family="system-ui, sans-serif" font-weight="bold" font-size="12" fill="#F7F5F0" text-anchor="middle">EXPORT COMPLIANCE PDF</text>
    </g>
  </g>
</svg>
