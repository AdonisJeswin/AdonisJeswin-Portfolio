<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <rect width="800" height="600" fill="#FFFFFF"/>
  <rect x="20" y="20" width="760" height="560" rx="12" fill="none" stroke="#D1C9BE" stroke-width="1.5"/>
  <text x="50" y="70" font-family="system-ui, sans-serif" font-weight="bold" font-size="16" fill="#0F0F0E">DOM PARSER NODE VISUALIZER</text>
  
  <!-- Render node tree structure -->
  <g transform="translate(100, 150)">
    <rect x="0" y="0" width="140" height="40" rx="6" fill="#F7F5F0" stroke="#0F0F0E" stroke-width="1"/>
    <text x="70" y="25" font-family="monospace" font-size="11" fill="#0F0F0E" text-anchor="middle">HTML &lt;body&gt;</text>
    
    <line x1="70" y1="40" x2="70" y2="100" stroke="#D1C9BE" stroke-width="1.5"/>
    
    <rect x="0" y="100" width="140" height="40" rx="6" fill="#F7F5F0" stroke="#0F0F0E" stroke-width="1"/>
    <text x="70" y="125" font-family="monospace" font-size="11" fill="#0F0F0E" text-anchor="middle">&lt;main&gt; wrapper</text>

    <line x1="70" y1="140" x2="70" y2="200" stroke="#D1C9BE" stroke-width="1.5"/>
    
    <rect x="0" y="200" width="140" height="40" rx="6" fill="#4F46E5" opacity="0.15" stroke="#4F46E5" stroke-width="2"/>
    <text x="70" y="225" font-family="monospace" font-size="11" fill="#4F46E5" font-weight="bold" text-anchor="middle">&lt;article&gt; content</text>
    <text x="70" y="260" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">(Privacy Policy root)</text>
  </g>
</svg>
