<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <rect width="800" height="600" fill="#FFFFFF"/>
  <rect x="20" y="20" width="760" height="560" rx="12" fill="none" stroke="#D1C9BE" stroke-width="1.5"/>
  <text x="50" y="70" font-family="system-ui, sans-serif" font-weight="bold" font-size="16" fill="#0F0F0E">SCAN HISTORY &amp; SCORES GRAPH</text>
  
  <g transform="translate(100, 150)">
    <!-- Grid -->
    <line x1="0" y1="0" x2="0" y2="300" stroke="#D1C9BE" stroke-width="1"/>
    <line x1="0" y1="300" x2="600" y2="300" stroke="#D1C9BE" stroke-width="1"/>
    
    <!-- Time-series curve of risk ratings -->
    <path d="M 50,220 L 150,180 L 250,250 L 350,120 L 450,100 L 550,50" fill="none" stroke="#4F46E5" stroke-width="3" stroke-linecap="round"/>
    <circle cx="550" cy="50" r="5" fill="#4F46E5"/>
    <text x="550" y="30" font-family="monospace" font-size="10" fill="#4F46E5" text-anchor="middle">Latest: 92% (High-Risk)</text>
  </g>
</svg>
