<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <rect width="800" height="600" fill="#FFFFFF"/>
  <rect x="20" y="20" width="760" height="560" rx="12" fill="none" stroke="#D1C9BE" stroke-width="1.5"/>
  <text x="50" y="70" font-family="system-ui, sans-serif" font-weight="bold" font-size="16" fill="#0F0F0E">MULTI-LAYER SCORING HEURISTICS</text>
  
  <g transform="translate(100, 150)">
    <!-- Layer 1 -->
    <rect x="0" y="0" width="600" height="50" rx="8" fill="#4F46E5" opacity="0.1"/>
    <text x="20" y="30" font-family="system-ui, sans-serif" font-weight="bold" font-size="12" fill="#4F46E5">LAYER 1: LOCAL HEURISTIC REGEX FILTER (Fast)</text>
    <text x="580" y="30" font-family="monospace" font-size="11" fill="#4F46E5" text-anchor="end">42ms latency</text>

    <!-- Layer 2 -->
    <rect x="0" y="80" width="600" height="50" rx="8" fill="#10B981" opacity="0.1"/>
    <text x="20" y="110" font-family="system-ui, sans-serif" font-weight="bold" font-size="12" fill="#10B981">LAYER 2: GEMINI 2.5 FLASH API TOKENS (Accurate)</text>
    <text x="580" y="110" font-family="monospace" font-size="11" fill="#10B981" text-anchor="end">1.48s latency</text>

    <!-- Layer 3 -->
    <rect x="0" y="160" width="600" height="50" rx="8" fill="#EF4444" opacity="0.1"/>
    <text x="20" y="190" font-family="system-ui, sans-serif" font-weight="bold" font-size="12" fill="#EF4444">LAYER 3: HUMAN VERIFICATION ESCALATION (Fallback)</text>
    <text x="580" y="190" font-family="monospace" font-size="11" fill="#EF4444" text-anchor="end">Manual action</text>
  </g>
</svg>
