<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- Background panel -->
  <rect width="600" height="400" fill="#0F0F0E"/>
  
  <!-- Frame -->
  <rect x="20" y="20" width="560" height="360" rx="10" fill="none" stroke="#2D2D2A" stroke-width="1.5"/>
  <path d="M 20,50 L 580,50" stroke="#2D2D2A" stroke-width="1.5"/>
  
  <!-- Header dots -->
  <circle cx="40" cy="35" r="5" fill="#EF4444"/>
  <circle cx="55" cy="35" r="5" fill="#F59E0B"/>
  <circle cx="70" cy="35" r="5" fill="#10B981"/>
  <text x="300" y="38" font-family="monospace" font-size="11" fill="#6B7280" text-anchor="middle">Phishing Email Classifier (Transformers)</text>
  
  <!-- Left Side: Email Contents -->
  <rect x="40" y="70" width="310" height="285" rx="8" fill="#1a1a19" stroke="#2D2D2A"/>
  <text x="55" y="95" font-family="monospace" font-size="10" fill="#6B7280">From: secure-alert@account-verify-support.com</text>
  <text x="55" y="115" font-family="monospace" font-size="10" fill="#6B7280">Subject: CRITICAL: Verify bank credentials immediately</text>
  <line x1="55" y1="125" x2="335" y2="125" stroke="#2D2D2A" stroke-width="1"/>
  
  <!-- Email body text -->
  <text x="55" y="150" font-family="sans-serif" font-size="9" fill="#F7F5F0" opacity="0.9">Dear Customer,</text>
  <text x="55" y="170" font-family="sans-serif" font-size="9" fill="#F7F5F0" opacity="0.9">We detected suspicious login requests on your profile.</text>
  <text x="55" y="190" font-family="sans-serif" font-size="9" fill="#F7F5F0" opacity="0.9">To avoid permanent account suspension, you must verify</text>
  <text x="55" y="210" font-family="sans-serif" font-size="9" fill="#F7F5F0" opacity="0.9">your password credentials within the next 24 hours.</text>
  
  <rect x="55" y="235" width="120" height="25" rx="4" fill="#EF4444"/>
  <text x="115" y="251" font-family="monospace" font-size="9" font-weight="bold" fill="#0F0F0E" text-anchor="middle">VERIFY ACCOUNT NOW</text>
  
  <!-- Right Side: NLP Analysis -->
  <rect x="370" y="70" width="190" height="285" rx="8" fill="#1a1a19" stroke="#2D2D2A"/>
  <text x="385" y="95" font-family="monospace" font-size="10" font-weight="bold" fill="#F7F5F0">MODEL EVALUATION</text>
  
  <!-- Danger Thermometer -->
  <rect x="385" y="125" width="20" height="150" rx="10" fill="#2D2D2A"/>
  <rect x="385" y="155" width="20" height="120" rx="10" fill="#EF4444"/>
  
  <!-- Risk rating details -->
  <text x="420" y="145" font-family="monospace" font-size="9" fill="#6B7280">Risk Rating:</text>
  <text x="420" y="165" font-family="monospace" font-size="16" font-weight="bold" fill="#EF4444">98.2%</text>
  
  <text x="420" y="200" font-family="monospace" font-size="9" fill="#6B7280">Key Triggers:</text>
  <text x="420" y="220" font-family="monospace" font-size="8" fill="#F59E0B">• High Urgency</text>
  <text x="420" y="235" font-family="monospace" font-size="8" fill="#F59E0B">• Credential Request</text>
  <text x="420" y="250" font-family="monospace" font-size="8" fill="#F59E0B">• Spoofed Domain</text>
</svg>
