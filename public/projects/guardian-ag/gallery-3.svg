<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <!-- Background panel -->
  <rect width="800" height="400" fill="#0F0F0E"/>
  
  <!-- Frame -->
  <rect x="20" y="20" width="760" height="360" rx="10" fill="none" stroke="#2D2D2A" stroke-width="1.5"/>
  <path d="M 20,50 L 780,50" stroke="#2D2D2A" stroke-width="1.5"/>
  
  <!-- Header controls -->
  <circle cx="40" cy="35" r="5" fill="#EF4444"/>
  <circle cx="55" cy="35" r="5" fill="#F59E0B"/>
  <circle cx="70" cy="35" r="5" fill="#10B981"/>
  <text x="400" y="38" font-family="monospace" font-size="11" fill="#6B7280" text-anchor="middle">Network Anomalous Behavior Detection (Ensemble ML)</text>
  
  <!-- Left Side: Scatter Plot chart -->
  <rect x="40" y="70" width="350" height="285" rx="8" fill="#1a1a19" stroke="#2D2D2A"/>
  <text x="55" y="95" font-family="monospace" font-size="10" font-weight="bold" fill="#F7F5F0">ISOLATION FOREST NODAL SPACE</text>
  
  <!-- Chart Axes -->
  <line x1="70" y1="120" x2="70" y2="300" stroke="#2D2D2A" stroke-width="1.5"/>
  <line x1="70" y1="300" x2="350" y2="300" stroke="#2D2D2A" stroke-width="1.5"/>
  
  <!-- Normal Nodes (Green) -->
  <circle cx="100" cy="270" r="4" fill="#10B981" opacity="0.6"/>
  <circle cx="120" cy="250" r="4" fill="#10B981" opacity="0.6"/>
  <circle cx="140" cy="260" r="4" fill="#10B981" opacity="0.6"/>
  <circle cx="160" cy="230" r="4" fill="#10B981" opacity="0.6"/>
  <circle cx="180" cy="220" r="4" fill="#10B981" opacity="0.6"/>
  <circle cx="200" cy="240" r="4" fill="#10B981" opacity="0.6"/>
  <circle cx="220" cy="250" r="4" fill="#10B981" opacity="0.6"/>
  
  <!-- Outlier Anomalous Nodes (Red) -->
  <circle cx="280" cy="140" r="5" fill="#EF4444"/>
  <circle cx="290" cy="130" r="5" fill="#EF4444"/>
  <circle cx="310" cy="160" r="5" fill="#EF4444"/>
  <circle cx="110" cy="130" r="5" fill="#EF4444"/>
  <!-- Outline pulse around outliers -->
  <circle cx="280" cy="140" r="10" fill="none" stroke="#EF4444" stroke-width="1" opacity="0.5"/>
  <circle cx="310" cy="160" r="10" fill="none" stroke="#EF4444" stroke-width="1" opacity="0.5"/>
  
  <!-- Right Side: SHAP Logs -->
  <rect x="410" y="70" width="350" height="285" rx="8" fill="#1a1a19" stroke="#2D2D2A"/>
  <text x="425" y="95" font-family="monospace" font-size="10" font-weight="bold" fill="#F7F5F0">SHAP METRIC INFERENCE LOGS</text>
  
  <!-- SHAP rows -->
  <text x="425" y="130" font-family="monospace" font-size="9" fill="#F7F5F0">> Event ID: #AE-7402 — Source: 182.16.8.9</text>
  <text x="425" y="150" font-family="monospace" font-size="9" fill="#EF4444">> Decision: ANOMALY Flagged (Isolation Forest distance = 0.58)</text>
  
  <!-- SHAP explanation horizontal bar chart -->
  <text x="425" y="190" font-family="monospace" font-size="8" fill="#6B7280">SHAP Feature Weights Impact (Local Contribution):</text>
  
  <!-- Feature 1: Connection Frequency -->
  <text x="425" y="220" font-family="monospace" font-size="8" fill="#F7F5F0">Freq rate:</text>
  <rect x="480" y="212" width="160" height="8" rx="2" fill="#EF4444"/>
  <text x="650" y="220" font-family="monospace" font-size="8" fill="#EF4444">+0.44</text>
  
  <!-- Feature 2: Data Volume Payload -->
  <text x="425" y="240" font-family="monospace" font-size="8" fill="#F7F5F0">Payload:</text>
  <rect x="480" y="232" width="100" height="8" rx="2" fill="#EF4444"/>
  <text x="590" y="240" font-family="monospace" font-size="8" fill="#EF4444">+0.26</text>
  
  <!-- Feature 3: Time Period Session -->
  <text x="425" y="260" font-family="monospace" font-size="8" fill="#F7F5F0">Session Hr:</text>
  <rect x="480" y="252" width="30" height="8" rx="2" fill="#10B981"/>
  <text x="520" y="260" font-family="monospace" font-size="8" fill="#10B981">-0.08</text>
</svg>
