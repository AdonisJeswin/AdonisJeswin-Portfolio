<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- Background panel -->
  <rect width="600" height="400" fill="#0F0F0E"/>
  
  <!-- Outer dashboard frame -->
  <rect x="20" y="20" width="560" height="360" rx="10" fill="none" stroke="#2D2D2A" stroke-width="1.5"/>
  
  <!-- Browser top control bar -->
  <path d="M 20,50 L 580,50" stroke="#2D2D2A" stroke-width="1.5"/>
  <circle cx="40" cy="35" r="5" fill="#EF4444"/>
  <circle cx="55" cy="35" r="5" fill="#F59E0B"/>
  <circle cx="70" cy="35" r="5" fill="#10B981"/>
  <text x="300" y="38" font-family="monospace" font-size="11" fill="#6B7280" text-anchor="middle">URL Detection Engine (XGBoost)</text>
  
  <!-- Input box mock -->
  <rect x="40" y="70" width="520" height="35" rx="5" fill="#1a1a19" stroke="#2D2D2A"/>
  <text x="55" y="92" font-family="monospace" font-size="11" fill="#10B981">Target URL: https://sec-verify-paypal.com/signin</text>
  
  <!-- Diagnostic Columns -->
  <!-- Left Box: Features -->
  <rect x="40" y="125" width="245" height="230" rx="8" fill="#1a1a19" stroke="#2D2D2A"/>
  <text x="55" y="145" font-family="monospace" font-size="10" font-weight="bold" fill="#F7F5F0">URL HEURISTIC EVALUATION</text>
  
  <text x="55" y="175" font-family="monospace" font-size="9" fill="#EF4444">• Homoglyph Spoof: Flagged (look-alike characters)</text>
  <text x="55" y="195" font-family="monospace" font-size="9" fill="#EF4444">• Entropy Score: 4.82 (High Randomness)</text>
  <text x="55" y="215" font-family="monospace" font-size="9" fill="#EF4444">• Domain Age: 2 Days (Risk Factor)</text>
  <text x="55" y="235" font-family="monospace" font-size="9" fill="#10B981">• HTTPS Signature: Valid Certificate</text>
  <text x="55" y="255" font-family="monospace" font-size="9" fill="#EF4444">• Typosquat Check: Matches paypal.com</text>

  <!-- Right Box: Consensus -->
  <rect x="315" y="125" width="245" height="230" rx="8" fill="#1a1a19" stroke="#2D2D2A"/>
  <text x="330" y="145" font-family="monospace" font-size="10" font-weight="bold" fill="#F7F5F0">MULTI-VENDOR CONSENSUS</text>
  
  <!-- Progress Circle -->
  <circle cx="437" cy="220" r="45" fill="none" stroke="#2D2D2A" stroke-width="8"/>
  <path d="M 437,175 A 45,45 0 1,1 392,220" fill="none" stroke="#EF4444" stroke-width="8" stroke-linecap="round"/>
  <text x="437" y="225" font-family="monospace" font-size="14" font-weight="bold" fill="#EF4444" text-anchor="middle">SUSPICIOUS</text>
  
  <text x="330" y="300" font-family="monospace" font-size="9" fill="#6B7280">VirusTotal Detection Ratio:</text>
  <text x="330" y="320" font-family="monospace" font-size="12" font-weight="bold" fill="#EF4444">42 / 66 Vendors Flagged</text>
</svg>
