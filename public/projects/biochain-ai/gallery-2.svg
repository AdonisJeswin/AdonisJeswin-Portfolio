    <line x1="30" y1="220" x2="610" y2="220" stroke="#D1C9BE" stroke-width="1"/>
    
    <text x="30" y="245" font-family="monospace" font-size="11" fill="#6B7280">grantAccess()</text>
    <text x="300" y="245" font-family="monospace" font-size="11" fill="#6B7280">45,124 gas</text>
    <text x="500" y="245" font-family="monospace" font-size="11" fill="#6B7280">$0.08</text>

    <line x1="30" y1="265" x2="610" y2="265" stroke="#D1C9BE" stroke-width="1"/>
    
    <text x="30" y="290" font-family="monospace" font-size="11" fill="#6B7280">revokeAccess()</text>
    <text x="300" y="290" font-family="monospace" font-size="11" fill="#6B7280">28,540 gas</text>
    <text x="500" y="290" font-family="monospace" font-size="11" fill="#6B7280">$0.05</text>
