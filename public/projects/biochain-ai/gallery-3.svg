<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <rect width="800" height="600" fill="#FFFFFF"/>
  <rect x="20" y="20" width="760" height="560" rx="12" fill="none" stroke="#D1C9BE" stroke-width="1.5"/>
  <text x="50" y="70" font-family="system-ui, sans-serif" font-weight="bold" font-size="16" fill="#0F0F0E">GEMINI AI CLINICAL ASSISTANT SUMMARY</text>
  
  <g transform="translate(80, 130)">
    <!-- Conversation logs UI -->
    <rect x="0" y="0" width="640" height="360" rx="12" fill="#F7F5F0" stroke="#D1C9BE" stroke-width="1"/>
    
    <!-- Doctor Query -->
    <path d="M 30,30 L 500,30 L 500,90 L 30,90 Z" fill="#EAE6DF" rx="8"/>
    <text x="50" y="55" font-family="system-ui, sans-serif" font-size="11" fill="#0F0F0E" font-weight="bold">User (Clinician):</text>
    <text x="50" y="75" font-family="system-ui, sans-serif" font-size="11" fill="#0F0F0E">"Summarize patient vitals trends over the last 2 hours."</text>

    <!-- AI Response -->
    <path d="M 140,120 L 610,120 L 610,320 L 140,320 Z" fill="#6366F1" opacity="0.08" rx="8"/>
    <text x="160" y="145" font-family="system-ui, sans-serif" font-size="11" fill="#6366F1" font-weight="bold">BioChain AI Assistant:</text>
    <text x="160" y="175" font-family="system-ui, sans-serif" font-size="11" fill="#0F0F0E">• Vitals stable. Heart rate average: 72 bpm.</text>
    <text x="160" y="205" font-family="system-ui, sans-serif" font-size="11" fill="#0F0F0E">• No oxygen desaturations found (remained above 97%).</text>
    <text x="160" y="235" font-family="system-ui, sans-serif" font-size="11" fill="#0F0F0E">• Recommended action: Continue WebSocket vitals telemetry</text>
    <text x="160" y="260" font-family="system-ui, sans-serif" font-size="11" fill="#0F0F0E">  for another 6 hours before checkup.</text>
  </g>
</svg>
