<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <rect width="1200" height="800" fill="#F7F5F0"/>
  <!-- Canvas dot grid background -->
  <g fill="#0F0F0E" opacity="0.08">
    <circle cx="100" cy="100" r="1.5"/><circle cx="200" cy="100" r="1.5"/><circle cx="300" cy="100" r="1.5"/><circle cx="400" cy="100" r="1.5"/><circle cx="500" cy="100" r="1.5"/><circle cx="600" cy="100" r="1.5"/><circle cx="700" cy="100" r="1.5"/><circle cx="800" cy="100" r="1.5"/><circle cx="900" cy="100" r="1.5"/><circle cx="1000" cy="100" r="1.5"/><circle cx="1100" cy="100" r="1.5"/>
    <circle cx="100" cy="200" r="1.5"/><circle cx="200" cy="200" r="1.5"/><circle cx="300" cy="200" r="1.5"/><circle cx="400" cy="200" r="1.5"/><circle cx="500" cy="200" r="1.5"/><circle cx="600" cy="200" r="1.5"/><circle cx="700" cy="200" r="1.5"/><circle cx="800" cy="200" r="1.5"/><circle cx="900" cy="200" r="1.5"/><circle cx="1000" cy="200" r="1.5"/><circle cx="1100" cy="200" r="1.5"/>
    <circle cx="100" cy="300" r="1.5"/><circle cx="200" cy="300" r="1.5"/><circle cx="300" cy="300" r="1.5"/><circle cx="400" cy="300" r="1.5"/><circle cx="500" cy="300" r="1.5"/><circle cx="600" cy="300" r="1.5"/><circle cx="700" cy="300" r="1.5"/><circle cx="800" cy="300" r="1.5"/><circle cx="900" cy="300" r="1.5"/><circle cx="1000" cy="300" r="1.5"/><circle cx="1100" cy="300" r="1.5"/>
    <circle cx="100" cy="400" r="1.5"/><circle cx="200" cy="400" r="1.5"/><circle cx="300" cy="400" r="1.5"/><circle cx="400" cy="400" r="1.5"/><circle cx="500" cy="400" r="1.5"/><circle cx="600" cy="400" r="1.5"/><circle cx="700" cy="400" r="1.5"/><circle cx="800" cy="400" r="1.5"/><circle cx="900" cy="400" r="1.5"/><circle cx="1000" cy="400" r="1.5"/><circle cx="1100" cy="400" r="1.5"/>
    <circle cx="100" cy="500" r="1.5"/><circle cx="200" cy="500" r="1.5"/><circle cx="300" cy="500" r="1.5"/><circle cx="400" cy="500" r="1.5"/><circle cx="500" cy="500" r="1.5"/><circle cx="600" cy="500" r="1.5"/><circle cx="700" cy="500" r="1.5"/><circle cx="800" cy="500" r="1.5"/><circle cx="900" cy="500" r="1.5"/><circle cx="1000" cy="500" r="1.5"/><circle cx="1100" cy="500" r="1.5"/>
    <circle cx="100" cy="600" r="1.5"/><circle cx="200" cy="600" r="1.5"/><circle cx="300" cy="600" r="1.5"/><circle cx="400" cy="600" r="1.5"/><circle cx="500" cy="600" r="1.5"/><circle cx="600" cy="600" r="1.5"/><circle cx="700" cy="600" r="1.5"/><circle cx="800" cy="600" r="1.5"/><circle cx="900" cy="600" r="1.5"/><circle cx="1000" cy="600" r="1.5"/><circle cx="1100" cy="600" r="1.5"/>
    <circle cx="100" cy="700" r="1.5"/><circle cx="200" cy="700" r="1.5"/><circle cx="300" cy="700" r="1.5"/><circle cx="400" cy="700" r="1.5"/><circle cx="500" cy="700" r="1.5"/><circle cx="600" cy="700" r="1.5"/><circle cx="700" cy="700" r="1.5"/><circle cx="800" cy="700" r="1.5"/><circle cx="900" cy="700" r="1.5"/><circle cx="1000" cy="700" r="1.5"/><circle cx="1100" cy="700" r="1.5"/>
  </g>

  <!-- Left Sidebar (Toolbox) -->
  <rect x="30" y="30" width="220" height="740" rx="16" fill="#FFFFFF" stroke="#D1C9BE" stroke-width="1.5" />
  <text x="50" y="70" font-family="system-ui, sans-serif" font-weight="bold" font-size="14" fill="#0F0F0E">AGENT NODES</text>
  <rect x="50" y="110" width="180" height="35" rx="8" fill="#F7F5F0" stroke="#D1C9BE" stroke-width="1"/>
  <text x="65" y="132" font-family="monospace" font-size="11" fill="#0F0F0E">▶ Trigger Node</text>
  <rect x="50" y="160" width="180" height="35" rx="8" fill="#F7F5F0" stroke="#D1C9BE" stroke-width="1"/>
  <text x="65" y="182" font-family="monospace" font-size="11" fill="#0F0F0E">🤖 LLM Call Agent</text>
  <rect x="50" y="210" width="180" height="35" rx="8" fill="#F7F5F0" stroke="#D1C9BE" stroke-width="1"/>
  <text x="65" y="232" font-family="monospace" font-size="11" fill="#0F0F0E">⚡ Tool Invoker</text>

  <!-- Node Connection lines -->
  <path d="M 450,225 C 500,225 500,325 580,325" fill="none" stroke="#6366F1" stroke-width="3" stroke-dasharray="4 4" />
  <path d="M 450,255 C 520,255 520,445 600,445" fill="none" stroke="#D1C9BE" stroke-width="2" />
  <path d="M 800,325 C 880,325 880,255 930,255" fill="none" stroke="#6366F1" stroke-width="3" />

  <!-- Node 1: Trigger Node -->
  <g transform="translate(300, 150)">
    <rect x="0" y="0" width="150" height="150" rx="12" fill="#FFFFFF" stroke="#0F0F0E" stroke-width="2" />
    <rect x="0" y="0" width="150" height="35" rx="12" fill="#6366F1" />
    <text x="15" y="22" font-family="system-ui, sans-serif" font-weight="bold" font-size="11" fill="#F7F5F0">INPUT TRIGGER</text>
    <text x="15" y="70" font-family="system-ui, sans-serif" font-size="12" fill="#6B7280">Port: Webhook</text>
    <text x="15" y="95" font-family="monospace" font-size="11" fill="#0F0F0E">STATUS: ACTIVE</text>
    <!-- Outputs -->
    <circle cx="150" cy="75" r="5" fill="#6366F1" stroke="#FFFFFF" stroke-width="1.5"/>
    <circle cx="150" cy="105" r="5" fill="#D1C9BE" stroke="#FFFFFF" stroke-width="1.5"/>
  </g>

  <!-- Node 2: LLM Executor Node -->
  <g transform="translate(580, 250)">
    <rect x="0" y="0" width="220" height="240" rx="12" fill="#FFFFFF" stroke="#6366F1" stroke-width="2.5" />
    <rect x="0" y="0" width="220" height="40" rx="12" fill="#0F0F0E" />
    <text x="15" y="25" font-family="system-ui, sans-serif" font-weight="bold" font-size="12" fill="#F7F5F0">🤖 LLM ASSISTANT</text>
    
    <!-- Input ports -->
    <circle cx="0" cy="75" r="5" fill="#6366F1" stroke="#FFFFFF" stroke-width="1.5"/>
    <circle cx="0" cy="195" r="5" fill="#D1C9BE" stroke="#FFFFFF" stroke-width="1.5"/>
    
    <text x="15" y="80" font-family="monospace" font-size="10" fill="#6B7280">MODEL: gpt-4o</text>
    <text x="15" y="115" font-family="system-ui, sans-serif" font-size="11" fill="#0F0F0E">System Prompt:</text>
    <rect x="15" y="130" width="190" height="50" rx="6" fill="#F7F5F0" stroke="#D1C9BE" stroke-width="1" />
    <text x="25" y="148" font-family="monospace" font-size="9" fill="#6B7280">"You are an orchestrator</text>
    <text x="25" y="162" font-family="monospace" font-size="9" fill="#6B7280">designed to compose..."</text>
    
    <!-- Outputs -->
    <circle cx="220" cy="75" r="5" fill="#6366F1" stroke="#FFFFFF" stroke-width="1.5"/>
  </g>

  <!-- Node 3: Tool Execution Node -->
  <g transform="translate(930, 180)">
    <rect x="0" y="0" width="180" height="150" rx="12" fill="#FFFFFF" stroke="#D1C9BE" stroke-width="1.5" />
    <rect x="0" y="0" width="180" height="35" rx="12" fill="#10B981" />
    <text x="15" y="22" font-family="system-ui, sans-serif" font-weight="bold" font-size="11" fill="#F7F5F0">TOOL: BROWSER</text>
    
    <!-- Inputs -->
    <circle cx="0" cy="75" r="5" fill="#6366F1" stroke="#FFFFFF" stroke-width="1.5"/>
    
    <text x="15" y="75" font-family="system-ui, sans-serif" font-size="11" fill="#0F0F0E">Search web for queries</text>
    <text x="15" y="105" font-family="monospace" font-size="10" fill="#10B981">EXECUTION TIME: 48ms</text>
  </g>
</svg>
