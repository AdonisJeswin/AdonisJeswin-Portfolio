<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <rect width="800" height="600" fill="#FFFFFF"/>
  <rect x="20" y="20" width="760" height="560" rx="12" fill="none" stroke="#D1C9BE" stroke-width="1.5"/>
  <text x="50" y="70" font-family="system-ui, sans-serif" font-weight="bold" font-size="16" fill="#0F0F0E">AGENT EXECUTION TRACE TELEMETRY</text>
  <!-- Latency metrics charts -->
  <g transform="translate(50, 120)">
    <text x="0" y="20" font-family="system-ui, sans-serif" font-weight="bold" font-size="12" fill="#0F0F0E">Total execution delay profile (ms)</text>
    <rect x="0" y="40" width="700" height="28" rx="4" fill="#EAE6DF"/>
    <!-- Segment 1: Model Call -->
    <rect x="0" y="40" width="450" height="28" rx="4" fill="#6366F1"/>
    <text x="225" y="58" font-family="system-ui, sans-serif" font-weight="bold" font-size="10" fill="#F7F5F0" text-anchor="middle">LLM Inference: 1.25s (62.5%)</text>
    <!-- Segment 2: Embedding -->
    <rect x="452" y="40" width="180" height="28" rx="4" fill="#10B981"/>
    <text x="542" y="58" font-family="system-ui, sans-serif" font-weight="bold" font-size="10" fill="#F7F5F0" text-anchor="middle">Vector Search: 450ms</text>
    
    <text x="0" y="110" font-family="monospace" font-size="11" fill="#0f0f0e">System resources summary:</text>
    <text x="0" y="140" font-family="monospace" font-size="11" fill="#6B7280">• Memory footprint peak: 42MB</text>
    <text x="0" y="165" font-family="monospace" font-size="11" fill="#6B7280">• Recursion depth safe limit: 12 levels</text>
  </g>
</svg>
