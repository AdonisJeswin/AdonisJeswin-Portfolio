<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <rect width="1200" height="800" fill="#F7F5F0"/>
  <!-- Sub-surface grid lines -->
  <g stroke="#0F0F0E" stroke-width="0.5" opacity="0.05">
    <path d="M 0,100 L 1200,100 M 0,200 L 1200,200 M 0,300 L 1200,300 M 0,400 L 1200,400 M 0,500 L 1200,500 M 0,600 L 1200,600 M 0,700 L 1200,700"/>
    <path d="M 150,0 L 150,800 M 300,0 L 300,800 M 450,0 L 450,800 M 600,0 L 600,800 M 750,0 L 750,800 M 900,0 L 900,800 M 1050,0 L 1050,800"/>
  </g>

  <!-- Desktop Dashboard (Manager Panel) -->
  <g transform="translate(60, 100)">
    <rect x="0" y="0" width="680" height="600" rx="16" fill="#FFFFFF" stroke="#D1C9BE" stroke-width="1.5" />
    <rect x="0" y="0" width="680" height="50" rx="16" fill="#0f0f0e"/>
    <text x="25" y="32" font-family="system-ui, sans-serif" font-weight="900" font-size="14" fill="#F7F5F0">CONSTRUX MANAGER PANEL</text>
    
    <!-- Table: Invoicing status -->
    <g transform="translate(30, 80)">
      <text x="0" y="20" font-family="system-ui, sans-serif" font-weight="bold" font-size="13" fill="#0F0F0E">PURCHASE ORDERS &amp; INVOICING</text>
      
      <!-- Table Headers -->
      <line x1="0" y1="40" x2="620" y2="40" stroke="#0F0F0E" stroke-width="1.5"/>
      <text x="10" y="60" font-family="monospace" font-size="11" font-weight="bold" fill="#0F0F0E">PO_ID</text>
      <text x="120" y="60" font-family="monospace" font-size="11" font-weight="bold" fill="#0F0F0E">Supplier</text>
      <text x="280" y="60" font-family="monospace" font-size="11" font-weight="bold" fill="#0F0F0E">Milestone Value</text>
      <text x="480" y="60" font-family="monospace" font-size="11" font-weight="bold" fill="#0F0F0E">Razorpay Status</text>
      <line x1="0" y1="75" x2="620" y2="75" stroke="#D1C9BE" stroke-width="1"/>
      
      <!-- Row 1 -->
      <text x="10" y="100" font-family="monospace" font-size="11" fill="#6B7280">#PO-8294</text>
      <text x="120" y="100" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">UltraTech Cement</text>
      <text x="280" y="100" font-family="monospace" font-size="11" fill="#6B7280">Rs. 4,50,000</text>
      <rect x="480" y="85" width="90" height="22" rx="11" fill="#10B981" opacity="0.15"/>
      <text x="525" y="100" font-family="system-ui, sans-serif" font-weight="bold" font-size="10" fill="#10B981" text-anchor="middle">PAID</text>

      <line x1="0" y1="120" x2="620" y2="120" stroke="#EAE6DF" stroke-width="1"/>

      <!-- Row 2 -->
      <text x="10" y="145" font-family="monospace" font-size="11" fill="#6B7280">#PO-8295</text>
      <text x="120" y="145" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">Jindal Steel &amp; Power</text>
      <text x="280" y="145" font-family="monospace" font-size="11" fill="#6B7280">Rs. 8,20,000</text>
      <rect x="480" y="130" width="90" height="22" rx="11" fill="#F59E0B" opacity="0.15"/>
      <text x="525" y="145" font-family="system-ui, sans-serif" font-weight="bold" font-size="10" fill="#F59E0B" text-anchor="middle">PENDING</text>
    </g>

    <!-- Map Geofence visualization on desktop -->
    <g transform="translate(30, 270)">
      <text x="0" y="20" font-family="system-ui, sans-serif" font-weight="bold" font-size="13" fill="#0F0F0E">GEOFENCE TRACKING BOUNDARIES</text>
      <rect x="0" y="40" width="620" height="250" rx="8" fill="#F7F5F0" stroke="#D1C9BE" stroke-width="1" />
      
      <!-- Boundary Circle -->
      <circle cx="310" cy="165" r="70" fill="#10B981" opacity="0.08" stroke="#10B981" stroke-width="2" stroke-dasharray="4 4"/>
      <text x="310" y="115" font-family="system-ui, sans-serif" font-weight="bold" font-size="10" fill="#10B981" text-anchor="middle">XAVIER CAMPUS BOUNDARY</text>
      
      <!-- Worker coordinates pointer -->
      <circle cx="320" cy="155" r="6" fill="#4F46E5"/>
      <text x="332" y="159" font-family="monospace" font-size="9" fill="#4F46E5" font-weight="bold">Worker #082 (IN)</text>
    </g>
  </g>

  <!-- Mobile App Interface (Worker Attendance Screen) -->
  <g transform="translate(800, 80)">
    <rect x="0" y="0" width="320" height="640" rx="36" fill="#0F0F0E" stroke="#D1C9BE" stroke-width="4" />
    <rect x="10" y="10" width="300" height="620" rx="28" fill="#FFFFFF" />
    <rect x="95" y="18" width="130" height="22" rx="11" fill="#0F0F0E" />

    <text x="30" y="80" font-family="system-ui, sans-serif" font-weight="900" font-size="18" fill="#0F0F0E">Construx Go</text>
    <text x="30" y="105" font-family="monospace" font-size="10" fill="#10B981">● GEOFENCE LOCKED: IN</text>

    <!-- DeepFace Scanning Area -->
    <g transform="translate(150, 270)">
      <circle cx="0" cy="0" r="85" fill="none" stroke="#EAE6DF" stroke-width="1.5" />
      
      <!-- User Head Outline -->
      <path d="M -30,40 C -30,0 -15,-30 0,-30 C 15,-30 30,0 30,40 Z" fill="#D1C9BE" />
      <circle cx="0" cy="-40" r="22" fill="#D1C9BE" />

      <!-- Scanning Target Matrix -->
      <circle cx="0" cy="-10" r="70" fill="none" stroke="#4F46E5" stroke-width="2" stroke-dasharray="8 8"/>
      <!-- Scanning Laser -->
      <line x1="-75" y1="-10" x2="75" y2="-10" stroke="#4F46E5" stroke-width="3" opacity="0.8"/>
      <text x="0" y="98" font-family="monospace" font-size="9" fill="#4F46E5" font-weight="bold" text-anchor="middle">DeepFace VERIFYING...</text>
    </g>

    <!-- Primary Action Button -->
    <g transform="translate(25, 490)">
      <rect x="0" y="0" width="250" height="50" rx="25" fill="#4F46E5" />
      <text x="125" y="29" font-family="system-ui, sans-serif" font-weight="bold" font-size="12" fill="#FFFFFF" text-anchor="middle">SUBMIT ATTENDANCE</text>
    </g>
    
    <text x="150" y="575" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">Lat: 19.043 | Lon: 72.842</text>
  </g>
</svg>
