<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <rect width="800" height="600" fill="#FFFFFF"/>
  <rect x="20" y="20" width="760" height="560" rx="12" fill="none" stroke="#D1C9BE" stroke-width="1.5"/>
  <text x="50" y="70" font-family="system-ui, sans-serif" font-weight="bold" font-size="16" fill="#0F0F0E">GEOFENCE &amp; COORDINATES VERIFICATION</text>
  
  <g transform="translate(80, 130)">
    <!-- Map panel -->
    <rect x="0" y="0" width="640" height="340" rx="12" fill="#F7F5F0" stroke="#D1C9BE" stroke-width="1"/>
    
    <!-- Geofence circle -->
    <circle cx="320" cy="170" r="110" fill="#10B981" opacity="0.08" stroke="#10B981" stroke-width="2"/>
    <text x="320" y="50" font-family="system-ui, sans-serif" font-weight="bold" font-size="12" fill="#10B981" text-anchor="middle">ACTIVE GEOFENCE RADAR (RADIUS: 150m)</text>
    
    <!-- Coordinate markers -->
    <circle cx="280" cy="140" r="5" fill="#4F46E5"/>
    <text x="290" y="143" font-family="monospace" font-size="9" fill="#4F46E5" font-weight="bold">Device 1 (IN)</text>

    <circle cx="450" cy="220" r="5" fill="#EF4444"/>
    <text x="460" y="223" font-family="monospace" font-size="9" fill="#EF4444" font-weight="bold">Device 2 (OUT)</text>
  </g>
</svg>
